name: Release

# On a version tag (e.g. v1.0.0), create a GitHub Release with auto-generated
# notes. The image for the tag is built by the Publish workflow in parallel.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/${{ github.repository_owner }}/geocatchatbot:${{ github.ref_name }}`
            Deployed automatically to prod by the **Docker Deploy** workflow.
